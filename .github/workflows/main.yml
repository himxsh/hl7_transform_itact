name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install project package
        run: python setup.py install

      - name: Compile FastAPI entrypoint
        run: python3 -m py_compile app.py

      - name: Run backend tests
        run: python -m pytest hl7_transform/test/ -v

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      REGISTRY_IMAGE: ${{ secrets.REGISTRY_IMAGE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t hl7-transform-itact:ci .

      - name: Log into container registry
        if: ${{ secrets.REGISTRY_USERNAME && secrets.REGISTRY_PASSWORD && secrets.REGISTRY_IMAGE }}
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${REGISTRY_IMAGE%/*} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Push Docker image
        if: ${{ secrets.REGISTRY_USERNAME && secrets.REGISTRY_PASSWORD && secrets.REGISTRY_IMAGE }}
        run: |
          docker tag hl7-transform-itact:ci ${REGISTRY_IMAGE}:${{ github.sha }}
          docker push ${REGISTRY_IMAGE}:${{ github.sha }}
          docker tag hl7-transform-itact:ci ${REGISTRY_IMAGE}:latest
          docker push ${REGISTRY_IMAGE}:latest

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ secrets.RENDER_API_KEY && secrets.RENDER_SERVICE_ID && github.event_name == 'push' && github.ref == 'refs/heads/master' }}

    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}'
